schema_version: 0.1

owner:
  name: "Jerry Ingram"
  handle: "jerry"
  nh_root: "6.0"

agency:
  council_dir: ".nexus"
  motion_dir: ".nexus/motions"

agents:
  - agent_key: "dev.council"
    id: "JAI::DEV::COUNCIL"
    nh_id: "6.0"
    parent_nh_id: null
    label: "DEV Council Root"
    tier: 2
    role: "council"
    function: "council"
    scope:
      - "repo:dev-jai-nexus"
      - "paths:.nexus/**"
      - "paths:portal/scripts/**"
      - "deny:portal/.env*"
      - "deny:**/*.env*"
      - "deny:**/secrets/**"
      - "actions:govern"
    delegates_to: []
    github_labels: ["council", "root"]

