      no mechanism permits untraced claims in the expected ratification record.

  - question: >
      Does the verify.json record the actual commands run and their actual
      exit codes — not paraphrased descriptions of what was run?
    response: >
      verify.json not yet produced. The execution.md specifies the two required
      gate commands exactly: validate-motion.mjs and validate-agency.mjs. The
