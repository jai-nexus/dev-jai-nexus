questions_evaluated:

  - question: >
      Can every claim in the decision.md be verified by reading the repo
      without trusting the author?
    response: >
      decision.md in proposed state contains no claims requiring trust. It
      presents a post-ratification boundary table with 7 rows:
      (1) corpus-v2-deliberation-protocol.md committed — verifiable by file
          existence check at declared path.
      (2) corpus-v2-tier-seat-matrix.yaml committed — verifiable by file
          existence at declared path.
      (3) Seat assignments for cost-discipline and governance-safety — verifiable
          by file existence of seat_002 and seat_003 assignment files.
      (4) Corpus V2 program graph has epic and program — verifiable by reading
          program-graph.yaml and confirming corpus-v2 era_id has epic
          corpus-v2-live-value-operations and program q2-corpus-v2-live-value-loop.
      (5) CR-06 met — verifiable by reading corpus-v2-readiness-criteria.md and
          confirming CR-06 current_status: met.
      (6) Summary 9/0/1 — verifiable by counting the summary table rows.
      (7) Tier 2 evaluation governed — verifiable by reading the committed
          deliberation protocol and confirming §2 Tier 2 entry.
      All seven boundary table claims are falsifiable from committed repo state.
      PASS.

  - question: >
      Does the evidence checklist in execution.md cover all success criteria
      stated in the proposal?
    response: >
      proposal.md lists 8 success criteria (SC-1 through SC-8). Mapping:
      SC-1 (deliberation-protocol.md with 6 sections) → evidence item 1:
        "corpus-v2-deliberation-protocol.md exists with 6 sections"
      SC-2 (tier-seat-matrix.yaml with Tier 0–3 entries) → evidence item 2:
        "corpus-v2-tier-seat-matrix.yaml exists with Tier 0–3 entries, each with
        mandatory_seats, optional_seats_by_kind, min_evaluations"
      SC-3 (seat_002 file committed) → evidence item 3
      SC-4 (seat_003 file committed) → evidence item 4 (implicit in "two additional
        seat assignment files committed" — items 3 and 4 together)
      SC-5 (program-graph.yaml with epic + program) → evidence item 5:
        "program-graph.yaml corpus-v2 has epic corpus-v2-live-value-operations
        and program q2-corpus-v2-live-value-loop with motion-0124 as parent_motion"
      SC-6 (launch packet committed) → evidence item 6
      SC-7 (CR-06 met; summary 9/0/1) → evidence item 7
      SC-8 (evaluation trace + agent-vote.json) → evidence item 8
      All 8 success criteria map to at least one binary evidence item. PASS.

  - question: >
      Are the validation commands in the evidence checklist reproducible —
      would running them again produce the same result?
    response: >
      The evidence checklist uses binary file-existence and field-value checks:
      (1) File exists at canonical path — deterministic against committed state.
      (2) YAML/JSON has specified fields with specified values — deterministic
          by reading static committed files.
      (3) Section headers present in protocol document — deterministic text match.
      (4) program-graph.yaml corpus-v2 entry has specific field values —
          deterministic read.
      (5) criteria doc CR-06 field equals "met"; summary counts equal 9/0/1 —
          deterministic read.
      (6) Evaluation trace pass_or_block value — deterministic read.
      No evidence item depends on external state, network calls, time-sensitive
      conditions, or mutable runtime data. The two gate commands (validate_motion,
      validate_agency) read static YAML and the agents.generated.yaml registry;
      both produce deterministic exit codes for unchanged input. All commands will
      produce identical results on re-run against the same committed state. PASS.

  - question: >
      Is there any claim in the vote rationale that cannot be traced to a
      specific committed artifact?
    response: >
      Vote rationale (vote.json reasons) not yet authored. Prospective assessment:
      The 8 evidence items in execution.md each specify a binary condition and an
      artifact path. A well-formed vote rationale for this motion would cite all
      8 evidence item results with their artifact paths. The only claim that could
      be authored without a committed artifact is the non-independence limitation
