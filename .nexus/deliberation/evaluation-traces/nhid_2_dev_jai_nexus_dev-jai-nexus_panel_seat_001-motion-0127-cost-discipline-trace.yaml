  artifact-only. A surface reading would flag this as a mismatch. The evaluation
  resolves it: the mismatch is the proof mechanism, it is documented (not silent),
  and the block condition ("no stated reason") is not triggered.

  First operational use of this seat (seat_002, established by motion-0124):
  the cost-discipline seat assignment was created specifically for cases like this —
  where declared cost category affects governance routing and requires explicit
  evaluation. The seat is functioning as designed.

  The motion does not inflate scope, does not create artifacts beyond what is
  required for the proof, and does not re-do prior work. PASS verdict.
