# cr05-first-agent-voted-motion-contract §2 independence note)
# The agent producing this trace (nhid_2_dev_jai_nexus_dev-jai-nexus_panel_seat_001)
# and the author of motion-0123 share the same underlying model (claude-sonnet-4-6).
# This evaluation is not adversarially independent.
#
# The advance over CR-04 is the object of evaluation, not the evaluator pool.
# In motion-0121, the agent evaluated a motion that instantiated the agent itself —
# the evaluation was self-referential by design. Here, the agent evaluates a motion
# that declares a governance era boundary: a motion that, if ratified, permanently
# changes the label of every future governance event and establishes a committed
# governance canon baseline. Whether the evidence chain is falsifiable, whether
# every claim traces to a committed artifact, whether block conditions are
# triggered — these are questions with real stakes for the governance record.
#
# This trace is structural proof: the evidence-falsifiability seat contract is
# being consumed to evaluate the opening event's evidence chain. It does not
# provide adversarial independence. That is a post-opening canon concern deferred
# explicitly by the contract and by this motion's hard stops.

questions_evaluated:

  - question: >
      Can every claim in the decision.md be verified by reading the repo
      without trusting the author?
    response: >
      As of proposed state, decision.md contains no material claims requiring
      trust — it states "Pending implementation and ratification vote" and
      lists a post-ratification boundary table derived from the proposal.
      The post-ratification boundary table claims are traced to:
      (1) the vote.json field `era: corpus-v2` — verifiable by grep at the
          path `.nexus/motions/motion-0123/vote.json` once committed;
      (2) the corpus-v2-canon-baseline.md document — verifiable at the declared
          path `.nexus/docs/corpus-v2-canon-baseline.md`;
      (3) the cr05-opening-checklist.yaml all-met state — verifiable by reading
          the file and confirming all 8 items `status: met`;
      (4) the program-graph.yaml corpus-v2 era entry — verifiable by reading
          the file and confirming `era_id: corpus-v2` with `first: motion-0123`.
      The challenge.md resolves 6 challenges, each citing specific committed
      artifact paths or named governance mechanisms (unanimous_consent_with_agent_witness,
      cr05-first-agent-voted-motion-contract §2, §3). No challenge resolution
      depends on author assertion alone. The pre-committed contract artifacts
      (cr05-opening-boundary.md, cr05-opening-checklist.yaml, cr05-first-agent-voted-motion-contract.md,
      cr05-panel-staging-guidance.yaml, cr05-inherited-context-packet.md) are all
      in committed repo state on the main branch, committed and merged as part
      of motion-0122 before this branch was created. PASS: no trust-only claims.

  - question: >
