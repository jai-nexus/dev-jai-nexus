      checklist items (per execution.md Step 5 guidance). The opening event's
      design — three pairs of artifacts each with a verifiable output statement —
      structurally constrains the vote rationale to artifact-traceable claims.
      The one potential gap: the claim that "the first Corpus V2 canon is established"
      traces to corpus-v2-canon-baseline.md at its declared path. If that file
      exists at that path in committed state, the claim is verifiable. If it does
      not exist, the ratification would be invalid. The path reference is the
      evidence; author assertion alone is not the evidence. Structurally PASS at
      ratification, definitively verifiable when the ratification record is committed.

  - question: >
      Does the verify.json record the actual commands run and their actual
      exit codes — not paraphrased descriptions of what was run?
    response: >
      verify.json is not yet produced (implementation pending). The execution.md
      evidence checklist specifies the exact commands and expected exit codes /
      output strings for each item. The established pattern for verify.json in
      this repo (motions 0118–0122) is to record exact command strings and exact
