questions_evaluated:

  - question: >
      Can every claim in the decision.md be verified by reading the repo
      without trusting the author?
    response: >
      decision.md claims: (1) activation gate correctly refused --create for
      substantial cost category; (2) corpus_v2_escalation_gate fired (exit 1);
      (3) no work packet created; (4) corpus_v2 metadata preserved through the
      artifact chain.
      Falsifiable sub-claims:
      (1) activation gate refused — verifiable by reading execution.activation.json:
          corpus_v2.outcome = "ESCALATE", work_packet_id = null,
          create_requested = true. File committed.
      (2) corpus_v2_escalation_gate fired — verifiable by the combination of
          create_requested: true AND work_packet_id: null AND outcome: ESCALATE.
          These three fields together prove the gate fired before packet creation.
      (3) no work packet created — verifiable: work_packet_id: null in activation
          artifact. The database was never reached (the fail() call happens before
          runCreate() is invoked in the script).
      (4) corpus_v2 metadata chain — verifiable by reading all three artifacts:
          handoff (cost_category:substantial, tier_hint:tier2, requires_operator_escalation:true),
          activation (outcome:ESCALATE, same fields), receipt (activation_outcome:ESCALATE,
          status:BLOCKED, requires_operator_escalation:true, finished_at set).
      All claims trace to committed artifacts. PASS.

  - question: >
      Does the evidence checklist in execution.md cover all success criteria
      stated in the proposal?
    response: >
      proposal.md success criteria:
      SC-1: execution.handoff.json issued with corpus_v2.requires_operator_escalation:true
        and corpus_v2.tier_hint:tier2
        → evidence log item 3: handoff verified with those exact fields
      SC-2: execution.activation.json records outcome:ESCALATE, create_requested:true,
        work_packet_id:null
        → evidence log items 4–5: dry-run (outcome=ESCALATE, exit 0) and --create
          (corpus_v2_escalation_gate FAIL, exit 1)
      SC-3: execution.receipt.json preserves activation_outcome:ESCALATE,
        requires_operator_escalation:true, status:BLOCKED
        → evidence log item 6: receipt recorded as BLOCKED with corpus_v2 fields
      SC-4: evaluation traces produced for evidence-falsifiability and cost-discipline
        (first operational use of seat_002)
        → this trace (evidence-falsifiability) + cost-discipline trace
      All 4 success criteria map to evidence log items. Items are specific and binary.
      PASS.

  - question: >
      Are the validation commands in the evidence checklist reproducible —
      would running them again produce the same result?
    response: >
      Evidence log items:
      (1) validate-motion EXIT 0 — deterministic against committed motion.yaml.
      (2) validate-agency EXIT 0 — deterministic against committed agents.generated.yaml.
      (3) issue-execution-handoff — idempotency check (script refuses if handoff
          already exists); the committed artifact is the deterministic reference.
      (4) activate dry-run — would re-run and derive same ESCALATE outcome from
          Category:substantial in execution.md. Deterministic against committed files.
      (5) activate --create — would refuse with same corpus_v2_escalation_gate error
          (exit 1) deterministically.
      (6) record-execution-receipt BLOCKED — idempotent re-run would overwrite with
          same fields; committed artifact is the deterministic reference.
      All commands are deterministic given the committed execution.md with
      Category:substantial. PASS.

  - question: >
      Is there any claim in the vote rationale that cannot be traced to a
      specific committed artifact?
    response: >
      vote.json reasons array cites specific field values from committed artifacts:
      activation.json corpus_v2.outcome:ESCALATE, work_packet_id:null,
      create_requested:true; receipt.json status:BLOCKED and corpus_v2 fields;
      exit code 1 from the --create run (not a committed artifact but the
      activation.json state proves the gate fired — see C-3 in challenge.md).
      No claim requires trusting the author without a committed artifact. PASS.

  - question: >
      Does the verify.json record the actual commands run and their actual
      exit codes — not paraphrased descriptions of what was run?
    response: >
      verify.json records validate_motion (exit 0) and validate_agency (exit 0) with
      exact command strings. Implementation checks are added with field values from
      committed artifacts, not paraphrased descriptions. The --create exit 1 is
      recorded as the combined evidence of create_requested:true + work_packet_id:null
