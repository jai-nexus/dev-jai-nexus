  - question: >
      Does the verify.json record the actual commands run and their actual
      exit codes — not paraphrased descriptions of what was run?
    response: >
      verify.json (original, pre-coherence-pass) records validate_motion and
      validate_agency with exit_code: 0 (as node portal/scripts/... -> EXIT 0
