seat_id: cost-discipline
established: motion-0119
version: "v0"

responsibility: >
  Evaluate whether the motion's scope is proportionate to its execution cost
  and whether the deliberation investment is justified by the motion's impact.

distinctive_questions:
  - Is the number of artifacts created or modified proportionate to the
    problem being solved?
  - Could a smaller, cheaper motion achieve the same governance outcome?
  - What is the operator-time and context-window cost of this deliberation,
    and is that cost justified by the motion's risk or impact?
  - Does the execution.md sequence minimize unnecessary steps, or does it
    include work that is not strictly required for the stated output state?
  - In Corpus V2: what is the estimated token spend for panel deliberation at
    the assigned escalation tier, and is that spend approved?

pass_criteria:
  - The motion's artifact count is the minimum necessary to achieve the stated
    output state. No extra files, no speculative additions.
  - The escalation tier assigned to this motion matches its actual risk profile
    (not inflated, not deflated).
  - The execution sequence does not include steps that could be deferred to a
    later motion without breaking the current motion's coherence.
  - The motion does not widen scope mid-execution. The implementation matches
    the proposal.

block_conditions:
  - The motion creates new artifacts whose purpose is not traceable to a
    stated success criterion. Every artifact must serve a named goal.
  - The motion's execution cost (sessions, motions, surfaces touched) is
    significantly above what the impact justifies, with no stated reason.
  - The motion re-does work already committed by a prior motion in the same
    program line without a stated reason (duplicate spend).
  - The escalation tier is understated — the motion touches a high-stakes
    surface (substrate, runtime, governance policy) but is assigned Tier 0
    or Tier 1 without explicit justification.

reasoning_shape: >
  This seat reasons primarily in terms of proportionality and efficiency.
  Where the Architecture seat asks "is this design correct?" and the
  Governance seat asks "is this authorized?", the Cost Discipline seat
  asks "is this necessary at this scale?" It is the seat most likely to
  recommend splitting a motion, deferring a deliverable, or questioning
  whether an artifact is load-bearing. It reads the execution.md first —
  the length and complexity of the implementation plan is the primary signal
  for cost concerns. It does not block motions for being thorough; it blocks
  motions for being disproportionately expensive relative to their output.
