version: "0.1"
artifact: "project-intake-instance"
program: "offbook-ai-bootstrap"
motion: "motion-0093"

# OffBook.ai Project Intake — real rollout instance
# Conforms to: .nexus/planning/project-intake.schema.yaml (WS-A, motion-0085)
# Supersedes: offbook-ai-intake-example.yaml (planning illustration only)

project_id: "offbook-ai"
project_name: "OffBook AI"
domain: "offbook.ai"
project_type: "greenfield"

topology:
  shape: "polyrepo"
  repos:
    - name: "offbook-core"
      domain_scope: "api"
      tier: "primary"
      governance_resident: true
      notes: "Core booking, availability, and pricing API. .nexus/ lives here."
    - name: "offbook-web"
      domain_scope: "frontend"
      tier: "secondary"
      governance_resident: false
      notes: "Web and mobile client surfaces."

execution_profile:
  class: "artifact_only"

required_roles:
  - ARCHITECT
  - BUILDER
  - VERIFIER
  - OPERATOR

optional_roles:
  - LIBRARIAN

staffing_tier: "minimum_viable"

nh_root: "7.0"
# 7.0 is the confirmed NH root for OffBook.ai.
# dev-jai-nexus uses 6.0; 7.0 is the next sequential project root.

notes: >
  OffBook.ai is a polyrepo greenfield project. The governance-resident repo
  is offbook-core. offbook-web agents are scoped via agency.yaml in
  offbook-core. Minimum viable staffing for Wave 0.

# --- WS-B output: agent demand (confirmed from planning baseline) ---
derived_agents:
  nh_root: "7.0"
  governance:
    - { role: council,    nh_id: "7.0",     agent_key: "offbook.council"    }
    - { role: proposer,   nh_id: "7.0.1",   agent_key: "offbook.proposer"   }
    - { role: executor,   nh_id: "7.0.2",   agent_key: "offbook.executor"   }
    - { role: challenger, nh_id: "7.0.3",   agent_key: "offbook.challenger" }
    - { role: arbiter,    nh_id: "7.0.4",   agent_key: "offbook.arbiter"    }
  execution:
    - role: ARCHITECT
      nh_id: "7.0.10"
      agent_key: "offbook.architect"
      scope_repos: ["offbook-core", "offbook-web"]
      scope_actions: ["read", "plan", "design"]
      slots: 1
    - role: BUILDER
      nh_id: "7.0.11"
      agent_key: "offbook.builder"
      scope_repos: ["offbook-core", "offbook-web"]
      scope_actions: ["read", "patch", "build"]
      slots: 1
    - role: VERIFIER
      nh_id: "7.0.12"
      agent_key: "offbook.verifier"
      scope_repos: ["offbook-core", "offbook-web"]
      scope_actions: ["read", "verify", "test"]
      slots: 1
    - role: OPERATOR
      nh_id: "7.0.14"
      agent_key: "offbook.operator"
      scope_repos: ["offbook-core"]
      scope_actions: ["read", "review", "approve"]
      slots: 1
  total_agents: 9
  staffing_summary: "minimum_viable: 5 governance + 4 execution = 9 total agents"
