version: "0.1"
artifact: "project-intake-schema"
program: "q3-bootstrap-planning"
workstream: "WS-A"
motion: "motion-0085"

# Schema for the minimum project intake object.
# Classification tiers:
#   required_at_intake  — must be present before WS-B/C/D planning can begin.
#   optional            — has a sensible default; may be omitted for standard
#                         greenfield projects.
#   derived_by_planner  — not in the intake object; computed by a downstream
#                         workstream. Listed in derived_fields for reference.

fields:
  project_id:
    type: string
    classification: required_at_intake
    format: "kebab-case"
    description: "Machine-safe project identifier. Used in NH IDs, artifact paths, and scope entries."
    example: "offbook-ai"

  project_name:
    type: string
    classification: required_at_intake
    description: "Human-readable project name."
    example: "OffBook AI"

  domain:
    type: string
    classification: required_at_intake
    format: "dns-like"
    description: "Canonical domain for this project. Used in target_domain fields across motions."
    example: "offbook.ai"

  project_type:
    type: enum
    classification: required_at_intake
    values: ["greenfield", "migration", "extension"]
    description: >
      greenfield: net-new project, no existing repos or NH root.
      migration: existing project being brought under JAI NEXUS governance;
        may have existing repos, code, and an existing NH root.
      extension: new project that extends an existing JAI NEXUS project;
        may share governance-resident infrastructure with a parent project.
      WS-C uses project_type to determine entry wave.
      WS-B uses project_type to determine whether an NH root must be assigned.

  topology:
    type: object
    classification: required_at_intake
    fields:
      shape:
        type: enum
        values: ["monorepo", "polyrepo"]
        classification: required_at_intake
        description: >
          Determines whether governance artifacts live in a single root or are
          distributed across repos with a designated governance-resident repo.
          WS-C derives execution_profile.scope from this field:
            monorepo → repo_local
            polyrepo → cross_repo

      repos:
        type: array
        classification: required_at_intake
        min_items: 1
        item_schema:
          name:
            type: string
            required: true
            description: "Repo name as it appears in scope entries."
          domain_scope:
            type: string
            required: true
            description: "What domain/layer this repo owns (e.g., 'api', 'frontend', 'infra')."
          tier:
            type: enum
            values: ["primary", "secondary", "tertiary"]
            required: true
          governance_resident:
            type: boolean
            required: true
            topology_note: >
              monorepo: always true (implicit; only one repo exists).
              polyrepo: must be explicitly true on exactly one repo.
            description: >
              If true, .nexus/ lives in this repo. Exactly one repo per project
              must be governance_resident=true.

  execution_profile:
    type: object
    classification: optional
    fields:
      class:
        type: enum
        values: ["artifact_only", "live_patch", "hybrid"]
        classification: optional
        default: "artifact_only"
        description: >
          artifact_only: agents emit durable artifacts but do not apply patches.
          live_patch: agents apply patches directly.
          hybrid: artifact_only for governance, live_patch for execution lanes.

  required_roles:
    type: array
    classification: required_at_intake
    values: ["ARCHITECT", "BUILDER", "VERIFIER", "OPERATOR", "LIBRARIAN"]
    default: ["ARCHITECT", "BUILDER", "VERIFIER", "OPERATOR"]
    description: >
      Execution roles that must be staffed for this project. Default covers
      the minimum viable governed execution loop.

  optional_roles:
    type: array
    classification: optional
    default: []
    values: ["ARCHITECT", "BUILDER", "VERIFIER", "OPERATOR", "LIBRARIAN"]
    description: "Execution roles that are useful but not required for Wave 0."

  staffing_tier:
    type: enum
    values: ["minimum_viable", "expanded", "panel"]
    classification: required_at_intake
    default: "minimum_viable"
    description: >
      minimum_viable: 1 agent per required role. No multi-slot panels.
      expanded: role.min_slots per role (from slot-policy.yaml).
      panel: role.max_slots per role; full comparison panel active.

  nh_root:
    type: string
    classification: optional
    description: >
      NH identifier root for this project (e.g., "7.0" for a new project root).
      If absent, must be assigned by WS-B (Agent Demand Planner) before
      agency.yaml can be generated.
      For migration projects, this may be an existing root.
    example: "7.0"

  notes:
    type: string
    classification: optional
    description: "Free-text notes about this project's specific constraints or context."

# --- Derived fields (not in intake; computed by downstream workstreams) ---
# Listed here for planner reference only. Do not include in intake objects.

derived_fields:
  execution_profile.scope:
    derived_by: "WS-C (Topology and Wave Planner)"
    rule: "monorepo → repo_local; polyrepo → cross_repo"

  bootstrap_wave:
    derived_by: "WS-C (Topology and Wave Planner)"
    rule: "greenfield → 0; migration/extension → determined by existing governance state"

  governance_mode:
    platform_invariant: true
    value: "motion_first"
    note: "All JAI NEXUS projects use motion_first governance. Not a per-project decision."
