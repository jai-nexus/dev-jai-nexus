motion_id: "motion-0086"
title: "Bounded Agent Demand Planner v0"

status: "proposed"
created_at: "2026-03-30T00:00:00Z"
owner: "Jerry Ingram"

kind: "planning-child"
program: "q3-bootstrap-planning"
parent_motion: "motion-0084"
workstream: "WS-B"

target:
  domain: "dev.jai.nexus"
  repo: "dev-jai-nexus"
  path: ".nexus/planning/agent-demand-matrix.schema.yaml"

summary: >
  Refine the agent-demand-matrix.schema.yaml draft produced under motion-0084
  into a decision-useful v0 planner artifact. Fix the NH-suffix convention
  errors that diverge from the agency.yaml baseline. Add scope_actions,
  governance_resident_only, and staffing-tier-to-slots mapping. Define clear
  rules for how monorepo vs polyrepo topology affects execution agent scope
  assignment. Pressure-test against the OffBook.ai intake example.

problem: >
  The draft agent-demand-matrix.schema.yaml has two NH-convention errors
  (council suffix and execution offset notation), both of which diverge from
  the canonical agency.yaml pattern proven in dev-jai-nexus. The schema also
  omits scope_actions (load-bearing in agency.yaml), provides no
  governance_resident_only flag to distinguish OPERATOR/LIBRARIAN from the
  broader execution agents, and leaves the staffing-tier-to-slots mapping
  undefined. Without these fixes a planner cannot produce an agency.yaml that
  matches the existing convention.

proposal:
  - "Fix NH-suffix convention: council has no suffix (it IS the nh_root);
    governance children use '.1'–'.4'; execution agents use '.10'–'.14'."
  - "Add scope_actions to execution_agents item schema (mirrors agency.yaml)."
  - "Add governance_resident_only boolean flag to execution_agents item schema:
    OPERATOR and LIBRARIAN default true; ARCHITECT/BUILDER/VERIFIER default false."
  - "Define staffing_tier_rules mapping: minimum_viable=1 slot, expanded=
    role.min_slots from slot-policy.yaml, panel=role.max_slots (5 candidates
    + 1 selector per role)."
  - "Define monorepo vs polyrepo scope_repos rules explicitly:
    monorepo: scope_repos=[single repo]; polyrepo: ARCHITECT/BUILDER/VERIFIER
    scope_repos=all repos, OPERATOR/LIBRARIAN scope_repos=[governance-resident
    repo only]."
  - "Confirm required roles and optional roles with explicit rationale."
  - "Confirm OffBook.ai fits the refined schema with no violations."

non_goals:
  - "Do not implement any generator or automation."
  - "Do not wire model-slots.yaml to runtimes."
  - "Do not define WS-C (topology/wave) rules."
  - "Do not change project-intake.schema.yaml or the OffBook.ai example file."
  - "Do not start OffBook.ai implementation."
  - "Do not create dispatch bridge or cross-repo federation infrastructure."

success_criteria:
  - "agent-demand-matrix.schema.yaml v0.1 NH-suffix convention matches agency.yaml."
  - "scope_actions field is present in execution_agents item schema."
  - "governance_resident_only flag is defined with defaults per role."
  - "staffing_tier_rules are explicit and grounded in slot-policy.yaml."
  - "monorepo vs polyrepo scope_repos rules are stated, not implicit."
  - "OffBook.ai can be cleanly represented using the refined schema."

vote:
  mode: "unanimous_consent"
  required_roles:
    - "proposer"
    - "challenger"
    - "arbiter"
