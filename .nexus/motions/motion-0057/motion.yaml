motion_id: "motion-0057"
title: "Motion Factory v0 — evidence insertion for proof motions"

status: "proposed"
created_at: "2026-03-17T00:00:00Z"
owner: "Jerry Ingram"

target:
  domain: "dev.jai.nexus"
  repo: "dev-jai-nexus"

summary: >
  Extend portal/scripts/motion-factory.mjs with an evidence command that
  inserts human-provided proof evidence into targeted narrative files of an
  existing motion draft. Evidence is source-fed by the operator, not inferred
  by the model. The model organizes and places provided evidence but never
  invents results. Writes are atomic and bounded to narrative files only.

problem: >
  Proof motions (like motions 0049–0051) require the operator to manually
  copy terminal output, expected-vs-actual results, and command logs into
  proposal.md and execution.md. This is tedious and error-prone. The factory
  can already draft and revise narrative content, but has no path for inserting
  real evidence from an external source. Adding a bounded evidence insertion
  command would reduce the remaining manual overhead for proof motions while
  preserving the hard rule that evidence must come from real sources, not
  model inference.

proposal:
  - "Add an evidence command to portal/scripts/motion-factory.mjs."
  - "Require --motion and --evidence-file as CLI arguments."
  - "Accept optional --notes for operator context about the evidence."
  - "Read the evidence file as raw text input (terminal output, command logs, expected-vs-actual results)."
  - "Read existing draft files from the target motion directory."
  - "Call the OpenAI API with existing draft content, evidence payload, and operator notes to update narrative files with organized evidence."
  - "Default evidence insertion scope: proposal.md, execution.md."
  - "Optional --files flag to narrow or extend within the allowed set (proposal.md, execution.md, challenge.md)."
  - "Never update: policy.yaml, decision.yaml, decision.md, vote.json, verify.json, motion.yaml."
  - "The model must organize and place provided evidence only. It must not invent PASS/FAIL claims, proof results, vote entries, or ratification claims beyond what the evidence explicitly shows."
  - "Writes are atomic: all targeted files updated together or none."
  - "Print a summary of updated files and a reminder that human review is required."

non_goals:
  - "Do not allow the model to invent evidence, PASS/FAIL claims, or proof results."
  - "Do not update structural governance files."
  - "Do not update motion.yaml via the evidence command."
  - "Do not implement revision behavior (revise command already exists)."
  - "Do not generate trace.json or transcript.jsonl."
  - "Do not write outside the target motion directory."
  - "Do not modify governance config files."
  - "Do not auto-ratify."
  - "Do not activate selectors."
  - "Do not introduce orchestration or runtime behavior."
  - "Do not add Anthropic or multi-provider support."

success_criteria:
  - "evidence command with --motion and --evidence-file reads a real evidence file and updates targeted narrative files."
  - "Default scope: proposal.md and execution.md."
  - "--files narrows or extends within the allowed set (proposal.md, execution.md, challenge.md)."
  - "Files outside the allowed set produce a clear error."
  - "Structural governance files are never modified."
  - "motion.yaml is never modified by the evidence command."
  - "Missing --motion or --evidence-file produces a clear error."
  - "Missing or empty evidence file produces a clear error."
  - "Missing target motion directory produces a clear error."
  - "Missing OPENAI_API_KEY produces a clear error."
  - "API failure leaves existing files untouched (atomic write)."
  - "Model-generated content organizes provided evidence but does not invent results."
  - "Stdout prints updated files list and human-review reminder."

vote:
  mode: "unanimous_consent"
  required_roles:
    - "proposer"
    - "challenger"
    - "arbiter"
