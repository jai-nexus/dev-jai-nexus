motion_id: "motion-0070"
title: "bounded council policy seam extraction"

status: "proposed"
created_at: "2026-03-29T00:00:00Z"
owner: "Jerry Ingram"

target:
  domain: "dev.jai.nexus"
  repo: "dev-jai-nexus"

summary: >
  Extract pure policy outcome derivation from council-run.mjs into a
  shared council helper (councilPolicyKernel.mjs). The kernel receives
  already-computed gate failure lists and risk values and returns the
  derived policy fields: required_ok, eligible_to_vote, low_risk,
  recommended_vote, blocking_reasons, and warnings. Gate list
  construction, file reads, policy.yaml rendering, and all orchestration
  remain local to council-run.mjs.

problem: >
  council-run.mjs now delegates vote evaluation to councilVoteKernel.mjs
  and decision outcome derivation to councilDecisionKernel.mjs. The
  policy outcome derivation (required_ok, eligible_to_vote, low_risk,
  recommended_vote, blocking_reasons, warnings) is still computed inline
  in the runner. This is the next natural seam: a small, pure function
  that takes pre-computed inputs and returns derived policy fields with
  no side effects.

proposal:
  - "Add portal/src/lib/council/councilPolicyKernel.mjs exporting deriveCouncilPolicyOutcome."
  - "deriveCouncilPolicyOutcome accepts failedRequiredGates, failedOptionalGates, riskScore, and maxRiskScore."
  - "deriveCouncilPolicyOutcome returns required_ok, eligible_to_vote, low_risk, recommended_vote, blocking_reasons, and warnings."
  - "Refactor the Stage 5 policy calculation in council-run.mjs to call deriveCouncilPolicyOutcome instead of inline derivation."
  - "Keep required/optional gate list construction (requiredGateList/optionalGateList) local to council-run.mjs."
  - "Keep gate scoreboard file read local to council-run.mjs."
  - "Keep policy.yaml template rendering and writeYamlIfChangedIgnoringKeys call local to council-run.mjs."
  - "Keep all orchestration, file I/O, and trace emission local to council-run.mjs."
  - "Do not change the policy.yaml output shape."
  - "Do not change vote or decision semantics."

non_goals:
  - "Do not extract gate list construction."
  - "Do not extract file reads or writes."
  - "Do not extract policy.yaml template rendering."
  - "Do not change vote semantics or decision semantics."
  - "Do not widen into snapshots, panels, Motion Factory, or handoff/receipt."
  - "Do not create a second truth system for council behavior."
  - "Do not touch any surface outside portal/src/lib/council/ and portal/scripts/council-run.mjs."

success_criteria:
  - "councilPolicyKernel.mjs exists and exports deriveCouncilPolicyOutcome."
  - "deriveCouncilPolicyOutcome is a pure function with no file I/O."
  - "council-run.mjs imports deriveCouncilPolicyOutcome and uses it for Stage 5 derivation."
  - "policy.yaml output shape is unchanged."
  - "node --check portal/scripts/council-run.mjs passes."
  - "node --check portal/src/lib/council/councilPolicyKernel.mjs passes."
  - "pnpm -C portal typecheck passes."
  - "No other files are changed."

vote:
  mode: "unanimous_consent"
  required_roles:
    - "proposer"
    - "challenger"
    - "arbiter"
