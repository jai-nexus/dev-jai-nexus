status: RATIFIED
decision_summary: "Ratified the device-to-server split as a boundary artifact separating private local workflow devices from future customer-serving server infrastructure."
rationale:
  - "JAI NEXUS needs a clear split between local operator hardware and later production infrastructure before customer-serving architecture is routed."
  - "The local fleet can accelerate private validation and dry-run review without implying customer workload, deployment, or data authority."
consequences:
  - "Desktop, MacBook, and Raspberry Pi ownership is easier to reason about from canon and the root overview."
  - "Future hosted app, API, database, auth, billing, secrets, and rollback work remain explicitly gated server-side follow-ons."
