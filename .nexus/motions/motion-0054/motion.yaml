motion_id: "motion-0054"
title: "Motion Factory v0 — first proposer generation lane via OpenAI API"

status: "proposed"
created_at: "2026-03-17T00:00:00Z"
owner: "Jerry Ingram"

target:
  domain: "dev.jai.nexus"
  repo: "dev-jai-nexus"

summary: >
  Extend the Motion Factory v0 draft command to call the OpenAI API for
  narrative content generation. Structural files remain deterministic.
  Narrative sections in motion.yaml, proposal.md, challenge.md, and
  execution.md are generated by the proposer model using the gathered
  context payload and human intent. The API key is read from the environment.
  Output remains DRAFT-only.

problem: >
  motion-0053 proved that the factory can scaffold a structurally correct
  9-file package, but narrative files are placeholder stubs. The human must
  still write all narrative content manually. This is the remaining drafting
  bottleneck. The context payload from motion-0052 and the structural scaffold
  from motion-0053 provide the foundation for model-assisted generation of
  narrative content only.

proposal:
  - "Extend the draft command in portal/scripts/motion-factory.mjs to call the OpenAI API after deterministic scaffolding."
  - "Use the gathered context payload and human --intent as the prompt input."
  - "Generate narrative content for: motion.yaml (summary, problem, proposal, non_goals, success_criteria), proposal.md, challenge.md, execution.md."
  - "Preserve deterministic generation for: policy.yaml, decision.yaml, decision.md, vote.json, verify.json."
  - "Read OPENAI_API_KEY from process.env. Fail clearly if missing."
  - "Add a --no-api flag that falls back to placeholder scaffolds (preserving motion-0053 behavior)."
  - "On API failure after scaffolding begins, keep structural files and fall back to placeholder narrative with a visible warning."
  - "Never generate evidence tables, PASS/FAIL claims, vote entries, or ratification claims."
  - "Output remains DRAFT-only with scaffold-only reminder on stdout."

non_goals:
  - "Do not implement the revise command."
  - "Do not generate trace.json or transcript.jsonl."
  - "Do not write outside .nexus/motions/motion-NNNN/."
  - "Do not modify governance config files."
  - "Do not auto-ratify."
  - "Do not fill votes."
  - "Do not generate evidence tables or PASS/FAIL claims."
  - "Do not activate selectors."
  - "Do not introduce orchestration or runtime behavior."
  - "Do not use Anthropic API in this motion."
  - "Do not store API keys in committed files."

success_criteria:
  - "draft command with OPENAI_API_KEY present generates narrative content for motion.yaml narrative fields, proposal.md, challenge.md, and execution.md."
  - "Structural files (policy.yaml, decision.yaml, decision.md, vote.json, verify.json) remain deterministically generated."
  - "Missing OPENAI_API_KEY in API mode produces a clear error before generation."
  - "--no-api flag falls back to placeholder scaffolds."
  - "API failure after scaffolding begins falls back to placeholder narrative with visible warning."
  - "Generated narrative contains no evidence tables, PASS/FAIL claims, vote entries, or ratification claims."
  - "Stdout prints scaffold-only reminder and notes whether narrative was model-generated or placeholder."
  - "No files written outside the motion directory."

vote:
  mode: "unanimous_consent"
  required_roles:
    - "proposer"
    - "challenger"
    - "arbiter"
