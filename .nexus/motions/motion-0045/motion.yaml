motion_id: "motion-0045"
title: "Full Motion Snapshot Generator v0: deterministic full-fidelity export + manifest"

status: "proposed"
created_at: "2026-03-17T00:00:00Z"
owner: "Jerry Ingram"

target:
  domain: "dev.jai.nexus"
  repo: "dev-jai-nexus"

summary: >
  Add a deterministic full-fidelity motion snapshot generator that exports the
  complete contents of motion artifacts, nested evidence/panel artifacts, and a
  manifest sidecar so future context bootstrapping no longer depends on partial
  or degraded motion snapshots.

problem: >
  The current motion snapshot flow has already shown a fidelity gap: earlier
  motions exported with full content, while later motions degraded into file
  listings only. That weakens context portability, makes multi-chat bootstrapping
  less reliable, and prevents generated snapshot artifacts from serving as a
  trustworthy full-governance export. dev-jai-nexus needs one governed exporter
  that produces a deterministic, full-content motion snapshot across the entire
  .nexus/motions tree.

proposal:
  - "Add a full-fidelity motion snapshot generator script under portal/scripts/."
  - "Export full contents for standard motion artifacts such as motion.yaml, proposal.md, challenge.md, execution.md, policy.yaml, verify.json, vote.json, decision.yaml, and decision.md when present."
  - "Recurse deterministically into nested motion subdirectories such as panels/** and evidence/**."
  - "Emit a dated full snapshot artifact under surfaces/chat-context/."
  - "Emit a dated manifest sidecar that records branch, head commit, generator path, and per-motion metadata."
  - "Add a package script for easy repeated invocation."

non_goals:
  - "Do not redesign the existing context bundle pipeline in this motion."
  - "Do not add semantic retrieval, embeddings, or indexing."
  - "Do not replace canonical source files with generated exports."
  - "Do not attempt cross-repo aggregation beyond dev-jai-nexus in v0."
  - "Do not suppress missing files silently."

success_criteria:
  - "A dated full motion snapshot artifact is generated under surfaces/chat-context/."
  - "A dated manifest sidecar is generated beside the snapshot."
  - "Later motions no longer degrade to filename-only listings."
  - "Nested motion artifacts such as panels/** and evidence/** are included deterministically."
  - "The snapshot header includes repo, branch, head commit, generated timestamp, and motion range."
  - "Missing vs empty files are represented explicitly and correctly."
  - "A package script exists for repeated invocation."
  - "Reruns on unchanged repo state are stable aside from timestamp/header fields."

vote:
  mode: "unanimous_consent"
  required_roles:
    - "proposer"
    - "challenger"
    - "arbiter"
