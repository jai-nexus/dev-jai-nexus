rationale:
  - "The human operator directly ratified a sequential portfolio posture and explicitly bypassed deliberation while JAI remains inactive."
  - "A durable package can preserve activation order and prerequisites without treating historical Agent, Program, model-slot, or Linear claims as current authority."
  - "Sequential reservation prevents later stages from being implied by earlier architecture or readiness evidence."
consequences:
  - "Future CONTROL_THREAD intake may reference the reserved sequence when deciding whether to propose a separately bounded Program."
  - "Every stage remains NOT_ROUTED and requires fresh human authority, main-state grounding, explicit scope, evidence gates, and a separately accepted execution route."
  - "Static Agent surfaces, model-slot manifests, legacy program graphs, motion artifacts, and temporary mirrors remain evidence only."
limitations:
  - "This decision does not define the required five-slot architecture; it reserves that definition as an earlier prerequisite stage."
  - "This decision does not assign NHIDs or convert human labels into identities."
  - "This decision does not authorize provider/model/API calls, API spend, database access, migrations, runtime, deployment, production gates, PR creation, merge, or cross-repo mutation."
