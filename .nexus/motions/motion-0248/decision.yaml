opening_rules:
  - "motion-0248 must be accepted on origin/main before any Program opening."
  - "Every opening requires a fresh MAIN_STATE_RECEIPT and a named CONTROL_THREAD PROGRAM_OPENING_RECEIPT citing evidence and a fresh origin/main SHA."
  - "Acceptance criteria, exit conditions, authorized boundaries, budgets, spend and credential posture, rollback, hold, cancellation, NO_GO, and non-authorizations must be explicit."
  - "No unresolved blocker, stale or stacked work, unrelated active work, or conflicting Program ledger entry may create ambiguity."
  - "Reserved status grants no execution authority; opening authorizes Batch planning only."
  - "Every Batch and Lane execution requires a separate exact CONTROL_THREAD repo-execution route."
  - "Programs 2, 3, and 4 require their immediate predecessor to be CLOSED_ACCEPTED and require a fresh main-state receipt confirming predecessor capabilities remain accepted."
failure_and_amendment_rules:
  - "CLOSED_NO_GO, cancellation, failure, or unresolved hold freezes every downstream Program."
  - "CONTROL_THREAD cannot silently skip, reorder, substitute, or rename a Program."
  - "Material changes require an explicit human-operator amendment or superseding motion."
  - "No new motion is required between Programs when order, scope, authority envelope, and intended outcome remain unchanged and every gate passes."
rationale:
  - "The human operator directly ratified a sequential portfolio posture and explicitly bypassed deliberation while JAI remains inactive."
  - "A durable package can preserve the exact four-Program order and prerequisites without treating historical Agent, Program, model-slot, or Linear claims as current authority."
  - "Sequential reservation prevents later Programs from being implied by earlier architecture or readiness evidence."
consequences:
  - "Future CONTROL_THREAD intake may evaluate Program 1 only after motion-0248 is accepted on origin/main and all opening prerequisites are satisfied."
  - "Each Program remains reserved and unopened until its named opening receipt; Program opening permits Batch planning, not execution."
  - "Static Agent surfaces, model-slot manifests, legacy program graphs, motion artifacts, and temporary mirrors remain evidence only."
limitations:
  - "This decision does not implement the five-slot shadow kernel, founder workflow pilot, or bounded Agent/Council pilot."
  - "This decision does not assign NHIDs or convert human labels into identities."
  - "This decision does not authorize provider/model/API calls, API spend, database access, migrations, runtime, deployment, production gates, PR creation, merge, or cross-repo mutation."
