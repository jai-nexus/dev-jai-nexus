status: RATIFIED
decision_summary: "Ratified as read-only agenda-to-deliberation routing/context only."
rationale:
  - "Agenda items now expose deliberation review affordances without mutating selected-candidate state."
  - "The active selected candidate remains static and governance-controlled while other items are reviewable only."
consequences:
  - "Operators can move from agenda items into deliberation context without route state, query state, or runtime selection."
  - "Active selected candidate remains wp-agent-registry-follow-up until a later explicit governance/code switch seam changes it."
