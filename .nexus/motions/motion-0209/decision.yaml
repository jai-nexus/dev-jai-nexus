decision_summary: "Ratified as a no-provider and no-authority agent-governance sandbox boundary seam only."
rationale:
  - "Future local experimentation needs a clearly bounded sandbox that cannot be mistaken for live activation."
  - "The sandbox boundary reduces ambiguity around what fixture-only work may occur safely."
consequences:
  - "Future experiments can be discussed without implying runtime authority."
  - "No provider, runtime, write, merge, or ratification authority is granted."
