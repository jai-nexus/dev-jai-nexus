motion_id: "motion-0039"
title: "Claude Setup Validation v0: first-project workflow + upload routine + handoff checklist"

status: "proposed"
created_at: "2026-03-13T00:00:00Z"
owner: "Jerry Ingram"

target:
  domain: "dev.jai.nexus"
  repo: "dev-jai-nexus"

summary: >
  Validate the polished Claude bootstrap pack against a real first-project setup
  workflow by defining the exact upload/read routine, the expected operator setup
  sequence, and a compact handoff checklist for starting new Claude work from
  governed repo context.

problem: >
  Motion-0038 proved that the Claude bootstrap pack is cleaner and easy to generate,
  but dev-jai-nexus still lacks a formally validated usage routine for how a human
  should actually use it to start work. Without a governed setup workflow, the pack
  exists but its day-to-day use may still drift or become inconsistent.

proposal:
  - "Define the first-project Claude setup workflow for dev-jai-nexus."
  - "Define the exact recommended upload/read order for practical Claude setup."
  - "Add a compact handoff checklist for starting a new Claude project or chat."
  - "Validate the workflow against the generated Claude bootstrap pack and current substrate."
  - "Keep the motion focused on operational validation, not new generator features."

non_goals:
  - "Do not redesign the bootstrap generator in this motion."
  - "Do not add provider orchestration or slot execution features."
  - "Do not automate Claude account, billing, or project creation."
  - "Do not replace canonical motion or substrate artifacts with workflow notes."
  - "Do not expand into cross-repo or multi-provider setup validation."

success_criteria:
  - "A governed first-project Claude setup workflow artifact exists."
  - "A governed upload/read order artifact exists and is compact."
  - "A governed Claude handoff checklist exists for starting new work."
  - "The workflow is validated against the generated Claude bootstrap pack."
  - "The workflow clearly distinguishes canonical artifacts from generated handoff artifacts."
  - "The validated setup routine is practical enough for immediate repeated use."
  - "portal typecheck passes if any code surfaces are touched."
  - "A local proof demonstrates the workflow can be followed as a real setup routine."

vote:
  mode: "unanimous_consent"
  required_roles:
    - "proposer"
    - "challenger"
    - "arbiter"
