status: RATIFIED
decision_summary: "Ratified as a readiness-taxonomy clarification for future Corpus V2 opening without opening the corpus or resetting numbering."
rationale:
  - "The control plane needs a clear taxonomy for what Corpus V2 means before any opening or numbering reset motion is considered."
  - "Agent operability, dry-run substrate readiness, and execution authority must remain explicitly distinguished."
consequences:
  - "Corpus V2 readiness requirements become easier to inspect and discuss from canon and the root overview."
  - "No corpus opening, numbering reset, provider/model, execution, or automation authority is introduced."
