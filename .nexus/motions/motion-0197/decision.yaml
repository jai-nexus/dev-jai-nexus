decision_summary: "Ratified as an explicit readiness-gate definition for Corpus V2 only."
rationale:
  - "Corpus V2 opening conditions are now explicit without falsely claiming that live agent drafting, voting, or ratification already exists."
  - "The gate preserves human override, historical immutability, and current authority boundaries."
consequences:
  - "Future Corpus V2 opening can be evaluated against a visible checklist rather than inferred from manual-era behavior."
  - "Operator surfaces can reference concrete blockers without enabling runtime switching or execution."
