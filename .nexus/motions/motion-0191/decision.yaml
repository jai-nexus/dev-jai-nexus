status: RATIFIED
decision_summary: "Ratified as a static selected-candidate switching model only."
rationale:
  - "Static/local switching metadata is now explicit and keeps candidate changes governance-controlled only."
  - "The current active candidate remains wp-agent-registry-follow-up without adding runtime controls, ranking, or persistence."
consequences:
  - "Future switching may be represented explicitly in code/governance seams without route state, API mutation, or persistence."
  - "The current selected candidate remains wp-agent-registry-follow-up until a later explicit switch seam changes it."
